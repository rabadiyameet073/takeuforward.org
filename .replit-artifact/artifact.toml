kind = "web"
previewPath = "/"
title = "TakeUforward Clone"
version = "1.0.0"
id = "artifacts/takeuforward-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19726

[services.development]
run = "pnpm --filter @workspace/takeuforward-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/takeuforward-clone", "run", "build" ]
publicDir = "artifacts/takeuforward-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19726"
BASE_PATH = "/"
